[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Tells pytest to look inside src/ for importable packages, so that
# "from northwind.generate import generate" works from the tests folder.
pythonpath = ["src"]