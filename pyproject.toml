[tool.ruff]
# Ruff is a linter: it reads your code and flags problems before you run it.
# Think of it as spellcheck for Python.
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors - formatting mistakes
    "F",   # pyflakes - unused imports, undefined names
    "I",   # isort - keeps imports in a consistent order
    "UP",  # pyupgrade - flags outdated Python syntax
]

[tool.pytest.ini_options]
testpaths = ["tests"]